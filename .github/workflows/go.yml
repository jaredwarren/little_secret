name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.x' # Fallback to standard Go version or use go-version-file: go.mod

    - name: Verify dependencies
      run: go mod verify

    - name: Run fmt check
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted. Run 'make fmt' to format."
          gofmt -d .
          exit 1
        fi

    - name: Run vet
      run: go vet ./...

    - name: Run tests
      run: go test -v -race ./...
